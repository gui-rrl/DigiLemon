<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — RankingDigi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app.css">
</head>
<body data-page="dashboard">
    <main class="container py-4">
        <header class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="page-title">
                    <span class="icon-badge"><i class="bi bi-graph-up"></i></span>
                    Dashboard
                </h1>
                <p class="page-subtitle mt-2">Visão geral de jogadores, decks e atividade.</p>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <label class="form-label mb-0 me-1 text-muted-2" for="rangeSelect">Período:</label>
                <select id="rangeSelect" class="form-select form-select-sm" style="width: auto;">
                    <option value="7">Últimos 7 dias</option>
                    <option value="30" selected>Últimos 30 dias</option>
                    <option value="90">Últimos 90 dias</option>
                    <option value="365">Último ano</option>
                </select>
            </div>
        </header>

        <section class="row g-3 mb-4" id="summaryRow">
            <div class="col-md-3">
                <div class="card-stat hover-lift">
                    <span class="stat-icon"><i class="bi bi-people-fill"></i></span>
                    <div>
                        <div class="stat-label">Jogadores</div>
                        <div class="stat-value" id="sumPlayers">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-stat warm hover-lift">
                    <span class="stat-icon"><i class="bi bi-controller"></i></span>
                    <div>
                        <div class="stat-label">Partidas</div>
                        <div class="stat-value" id="sumMatches">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-stat cool hover-lift">
                    <span class="stat-icon"><i class="bi bi-trophy-fill"></i></span>
                    <div>
                        <div class="stat-label">Torneios</div>
                        <div class="stat-value" id="sumTournaments">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-stat hover-lift">
                    <span class="stat-icon" style="background: linear-gradient(135deg,#ffb547,#ff8a5b);"><i class="bi bi-handshake"></i></span>
                    <div>
                        <div class="stat-label">Empates</div>
                        <div class="stat-value" id="sumDraws">0</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="row g-3 mb-3">
            <div class="col-lg-6">
                <div class="chart-card">
                    <h3><i class="bi bi-trophy"></i> Top 5 jogadores por pontuação</h3>
                    <div class="chart-wrapper"><canvas id="chartTopPlayers"></canvas></div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="chart-card">
                    <h3><i class="bi bi-layers"></i> Decks com mais vitórias</h3>
                    <div class="chart-wrapper"><canvas id="chartTopDecks"></canvas></div>
                </div>
            </div>
        </section>

        <section class="row g-3 mb-3">
            <div class="col-lg-7">
                <div class="chart-card">
                    <h3><i class="bi bi-calendar3"></i> Partidas por dia</h3>
                    <div class="chart-wrapper"><canvas id="chartMatchesPerDay"></canvas></div>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="chart-card">
                    <h3><i class="bi bi-pie-chart"></i> Resultados (decididas vs empates)</h3>
                    <div class="chart-wrapper"><canvas id="chartResults"></canvas></div>
                </div>
            </div>
        </section>

        <section class="row g-3">
            <div class="col-12">
                <div class="chart-card">
                    <h3><i class="bi bi-bar-chart-line"></i> Vitórias por jogador</h3>
                    <div class="chart-wrapper" style="height: 320px;"><canvas id="chartPlayerWins"></canvas></div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/scripts/auth.js"></script>
    <script src="/scripts/common.js"></script>
    <script>authGuard();</script>
    <script src="/scripts/dashboard.js"></script>
</body>
</html>
