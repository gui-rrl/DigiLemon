<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários — RankingDigi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app.css">
</head>
<body data-page="users">
    <main class="container-xxl py-4">
        <header class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="page-title">
                    <span class="icon-badge"><i class="bi bi-people-fill"></i></span>
                    Usuários
                </h1>
                <p class="page-subtitle mt-2">Gerencie os usuários com acesso ao sistema.</p>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCreateUser">
                <i class="bi bi-person-plus-fill"></i> Novo usuário
            </button>
        </header>

        <section class="card-app">
            <div class="card-header">
                <i class="bi bi-person-lines-fill"></i> Todos os usuários
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table-app">
                        <thead>
                            <tr>
                                <th style="width:60px;">#</th>
                                <th>Usuário</th>
                                <th style="width:120px;">Perfil</th>
                                <th style="width:200px;">Jogador vinculado</th>
                                <th style="width:180px; text-align:right;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable">
                            <tr class="loading-row">
                                <td colspan="5">
                                    <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                                    <span class="ms-2">Carregando usuários…</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal criar usuário -->
    <div class="modal fade" id="modalCreateUser" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-person-plus-fill me-2"></i> Novo usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nome de usuário</label>
                        <input type="text" id="newUsername" class="form-control" placeholder="Digite o nome de usuário">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="Mínimo 4 caracteres">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Perfil</label>
                        <select id="newRole" class="form-select">
                            <option value="Player">Player</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                    <div class="mb-1">
                        <label class="form-label">Jogador vinculado <small class="text-muted-2">(opcional)</small></label>
                        <select id="newPlayerId" class="form-select">
                            <option value="">Nenhum</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnCreateUser">
                        <i class="bi bi-check2-circle"></i> Criar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal trocar senha -->
    <div class="modal fade" id="modalChangePassword" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-key-fill me-2"></i> Trocar senha</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted-2 mb-3">Alterando senha de: <strong id="changePasswordUsername"></strong></p>
                    <div class="mb-1">
                        <label class="form-label">Nova senha</label>
                        <input type="password" id="changePasswordValue" class="form-control" placeholder="Mínimo 4 caracteres">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnSavePassword">
                        <i class="bi bi-check2-circle"></i> Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/auth.js"></script>
    <script src="/scripts/common.js"></script>
    <script>authGuard(true);</script>
    <script src="/scripts/users.js"></script>
</body>
</html>
