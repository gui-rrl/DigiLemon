<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil — RankingDigi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app.css">
</head>
<body data-page="profile">
    <main class="container py-4" style="max-width: 640px;">
        <header class="d-flex justify-content-between align-items-center gap-3 mb-4">
            <h1 class="page-title">
                <span class="icon-badge"><i class="bi bi-person-circle"></i></span>
                Meu Perfil
            </h1>
            <a href="javascript:history.back()" class="btn btn-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </header>

        <!-- Informações do usuário -->
        <section class="card-app mb-4">
            <div class="card-header"><i class="bi bi-info-circle"></i> Informações da conta</div>
            <div class="card-body">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div id="userAvatar" style="
                        width: 56px; height: 56px; border-radius: 50%;
                        background: linear-gradient(135deg, var(--accent), var(--primary));
                        display: flex; align-items: center; justify-content: center;
                        font-size: 1.3rem; font-weight: 700; color: #fff; flex-shrink: 0;
                    ">?</div>
                    <div>
                        <div id="displayUsername" style="font-size: 1.1rem; font-weight: 700; color: var(--text-1);">—</div>
                        <div id="displayRole" class="mt-1"></div>
                    </div>
                </div>
                <div class="row g-2" style="font-size: 0.875rem; color: var(--text-2);">
                    <div class="col-sm-6">
                        <span style="color:var(--text-3);">Jogador vinculado:</span>
                        <strong id="displayPlayerName" class="ms-1">—</strong>
                    </div>
                </div>
            </div>
        </section>

        <!-- Alterar senha -->
        <section class="card-app">
            <div class="card-header"><i class="bi bi-key-fill"></i> Alterar senha</div>
            <div class="card-body">
                <form id="changePasswordForm" novalidate>
                    <div class="mb-3">
                        <label for="currentPassword" class="form-label">Senha atual</label>
                        <div class="input-group">
                            <input type="password" id="currentPassword" class="form-control" placeholder="Digite sua senha atual" autocomplete="current-password">
                            <button type="button" class="btn btn-outline-secondary toggle-pw" data-target="currentPassword" tabindex="-1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">Nova senha</label>
                        <div class="input-group">
                            <input type="password" id="newPassword" class="form-control" placeholder="Mínimo 4 caracteres" autocomplete="new-password">
                            <button type="button" class="btn btn-outline-secondary toggle-pw" data-target="newPassword" tabindex="-1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">Confirmar nova senha</label>
                        <div class="input-group">
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Repita a nova senha" autocomplete="new-password">
                            <button type="button" class="btn btn-outline-secondary toggle-pw" data-target="confirmPassword" tabindex="-1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="savePasswordBtn">
                        <i class="bi bi-check2-circle"></i> Salvar nova senha
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/auth.js"></script>
    <script src="/scripts/common.js"></script>
    <script src="/scripts/profile.js"></script>
</body>
</html>
