<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
<script>(function(){var t=localStorage.getItem("rankingdigi-theme")||(matchMedia("(prefers-color-scheme: light)").matches?"light":"dark");document.documentElement.setAttribute("data-theme",t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir senha — RankingDigi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--gradient-bg); padding: 2rem 1rem; }
        .card-wrap {
            width: 100%; max-width: 420px;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-lg);
        }
        .logo-icon { font-size: 2.5rem; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .page-title { font-family: 'Sora', sans-serif; font-weight: 700; color: var(--text-1); }
        .page-sub   { color: var(--text-3); font-size: 0.9rem; }
        .toggle-pw  { border-left: none; }
    </style>
</head>
<body>
    <div class="card-wrap">
        <div class="text-center mb-4">
            <div class="logo-icon mb-2"><i class="bi bi-trophy-fill"></i></div>
            <h1 class="page-title h4 mb-1">Nova senha</h1>
            <p class="page-sub">Digite e confirme sua nova senha de acesso.</p>
        </div>

        <!-- Token inválido -->
        <div id="stateInvalid" style="display:none; text-align:center;">
            <div style="font-size:3rem; margin-bottom:1rem;">❌</div>
            <h2 class="page-title h5 mb-2">Link inválido ou expirado</h2>
            <p class="page-sub mb-4">Este link de recuperação não é válido ou já expirou. Solicite um novo.</p>
            <a href="/forgot-password.html" class="btn btn-primary w-100">
                <i class="bi bi-arrow-repeat"></i> Solicitar novo link
            </a>
        </div>

        <!-- Formulário -->
        <div id="formView">
            <form id="resetForm" novalidate>
                <div class="mb-3">
                    <label for="newPassword" class="form-label">Nova senha</label>
                    <div class="input-group">
                        <input type="password" id="newPassword" class="form-control" placeholder="Mínimo 4 caracteres" autocomplete="new-password" required>
                        <button type="button" class="btn btn-outline-secondary toggle-pw" data-target="newPassword" tabindex="-1"><i class="bi bi-eye"></i></button>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Confirmar nova senha</label>
                    <div class="input-group">
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Repita a nova senha" autocomplete="new-password" required>
                        <button type="button" class="btn btn-outline-secondary toggle-pw" data-target="confirmPassword" tabindex="-1"><i class="bi bi-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="saveBtn">
                    <i class="bi bi-check2-circle"></i> Salvar nova senha
                </button>
            </form>
        </div>

        <!-- Sucesso -->
        <div id="stateSuccess" style="display:none; text-align:center;">
            <div style="font-size:3rem; margin-bottom:1rem;">✅</div>
            <h2 class="page-title h5 mb-2">Senha redefinida!</h2>
            <p class="page-sub mb-4">Sua senha foi alterada com sucesso. Faça login com a nova senha.</p>
            <a href="/login.html" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Ir para o login
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            document.getElementById('formView').style.display = 'none';
            document.getElementById('stateInvalid').style.display = '';
        }

        // Toggle mostrar/ocultar senha
        document.querySelectorAll('.toggle-pw').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const icon  = btn.querySelector('i');
                input.type = input.type === 'password' ? 'text' : 'password';
                icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
            });
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword     = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || newPassword.length < 4) {
                Swal.fire({ icon: 'warning', title: 'Atenção', text: 'A senha deve ter ao menos 4 caracteres.', confirmButtonText: 'Ok' });
                return;
            }
            if (newPassword !== confirmPassword) {
                Swal.fire({ icon: 'warning', title: 'Atenção', text: 'As senhas não coincidem.', confirmButtonText: 'Ok' });
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvando…';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
                    body: JSON.stringify({ token, newPassword, confirmPassword }),
                });

                const data = await res.json();

                if (!res.ok) {
                    if (res.status === 400 && (data.error?.includes('inválido') || data.error?.includes('expirado'))) {
                        document.getElementById('formView').style.display = 'none';
                        document.getElementById('stateInvalid').style.display = '';
                        return;
                    }
                    throw new Error(data.error || 'Erro ao redefinir senha.');
                }

                document.getElementById('formView').style.display = 'none';
                document.getElementById('stateSuccess').style.display = '';
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Erro', text: err.message, confirmButtonText: 'Tentar novamente' });
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-check2-circle"></i> Salvar nova senha';
            }
        });
    </script>
    <script src="/scripts/theme.js"></script>
</body>
</html>
