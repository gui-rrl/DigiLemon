<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar conta — RankingDigi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--gradient-bg); padding: 2rem 1rem; }
        .register-card {
            width: 100%; max-width: 460px;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-lg);
        }
        .login-logo {
            font-size: 2.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-title { font-family: 'Sora', sans-serif; font-weight: 700; color: var(--text-1); }
        .login-sub   { color: var(--text-3); font-size: 0.9rem; }
        .player-section {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            margin-top: 0.5rem;
            background: var(--bg-2);
        }
        .toggle-pw { border-left: none; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="text-center mb-4">
            <div class="login-logo mb-2"><i class="bi bi-trophy-fill"></i></div>
            <h1 class="login-title h4 mb-1">RankingDigi</h1>
            <p class="login-sub">Crie sua conta de acesso</p>
        </div>

        <form id="registerForm" novalidate>
            <!-- Dados de acesso -->
            <div class="mb-3">
                <label for="username" class="form-label">Nome de usuário <span class="text-danger">*</span></label>
                <input type="text" id="username" class="form-control" placeholder="Ex: joaosilva" autocomplete="username" required>
                <div class="form-text">Usado para fazer login. Sem espaços.</div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">E-mail <span class="text-danger">*</span></label>
                <input type="email" id="email" class="form-control" placeholder="seu@email.com" autocomplete="email" required>
                <div class="form-text">Você receberá um link de confirmação neste e-mail.</div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Senha <span class="text-danger">*</span></label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control" placeholder="Mínimo 4 caracteres" autocomplete="new-password" required>
                    <button type="button" class="btn btn-outline-secondary toggle-pw" data-target="password" tabindex="-1"><i class="bi bi-eye"></i></button>
                </div>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirmar senha <span class="text-danger">*</span></label>
                <div class="input-group">
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Repita a senha" autocomplete="new-password" required>
                    <button type="button" class="btn btn-outline-secondary toggle-pw" data-target="confirmPassword" tabindex="-1"><i class="bi bi-eye"></i></button>
                </div>
            </div>

            <!-- Jogador vinculado (opcional) -->
            <div class="mb-4">
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="linkPlayerCheck" role="switch">
                    <label class="form-check-label" for="linkPlayerCheck">
                        <i class="bi bi-controller"></i> Criar jogador vinculado à conta
                    </label>
                </div>
                <div class="player-section" id="playerSection" style="display:none;">
                    <label for="playerName" class="form-label mb-1" style="font-size:0.88rem;">Nome do jogador no ranking</label>
                    <input type="text" id="playerName" class="form-control form-control-sm" placeholder="Nome que aparece no ranking">
                    <div class="form-text">Este nome ficará visível publicamente no ranking.</div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="registerBtn">
                <i class="bi bi-person-plus-fill"></i> Criar conta
            </button>
        </form>

        <hr style="border-color: var(--border); margin: 1.5rem 0;">
        <p class="text-center mb-0" style="font-size:0.87rem; color: var(--text-3);">
            Já tem uma conta?
            <a href="/login.html" style="color: var(--primary); font-weight:600;">Fazer login</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Toggle mostrar/ocultar senha
        document.querySelectorAll('.toggle-pw').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const icon  = btn.querySelector('i');
                input.type = input.type === 'password' ? 'text' : 'password';
                icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
            });
        });

        // Toggle seção de jogador
        document.getElementById('linkPlayerCheck').addEventListener('change', function () {
            document.getElementById('playerSection').style.display = this.checked ? '' : 'none';
            document.getElementById('playerName').required = this.checked;
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username        = document.getElementById('username').value.trim();
            const email           = document.getElementById('email').value.trim();
            const password        = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const linkPlayer      = document.getElementById('linkPlayerCheck').checked;
            const playerName      = document.getElementById('playerName').value.trim();

            // Validações client-side
            if (!username) { showWarn('Informe um nome de usuário.'); return; }
            if (/\s/.test(username)) { showWarn('O nome de usuário não pode ter espaços.'); return; }
            if (!email || !email.includes('@')) { showWarn('Informe um e-mail válido.'); return; }
            if (!password || password.length < 4) { showWarn('A senha deve ter ao menos 4 caracteres.'); return; }
            if (password !== confirmPassword) { showWarn('As senhas não coincidem.'); return; }
            if (linkPlayer && !playerName) { showWarn('Informe o nome do jogador no ranking.'); return; }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Criando conta…';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': '1',
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        confirmPassword,
                        playerName: linkPlayer ? playerName : null,
                    }),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Erro ao criar conta.');
                }

                await Swal.fire({
                    icon: 'success',
                    title: 'Conta criada!',
                    html: `<p style="color:#8892aa;">Enviamos um e-mail de confirmação para <strong>${escapeHtml(email)}</strong>.<br>Clique no link no e-mail para ativar sua conta.</p>`,
                    confirmButtonText: 'Ir para o login',
                    allowOutsideClick: false,
                });

                window.location.href = '/login.html';
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Erro', text: err.message, confirmButtonText: 'Tentar novamente' });
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-person-plus-fill"></i> Criar conta';
            }
        });

        function showWarn(msg) {
            Swal.fire({ icon: 'warning', title: 'Atenção', text: msg, confirmButtonText: 'Ok' });
        }

        function escapeHtml(v) {
            return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>
</body>
</html>
