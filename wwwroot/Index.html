<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
<script>(function(){var t=localStorage.getItem("rankingdigi-theme")||(matchMedia("(prefers-color-scheme: light)").matches?"light":"dark");document.documentElement.setAttribute("data-theme",t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankingDigi — Ranking de Jogadores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app.css">
</head>
<body data-page="ranking">
    <main class="container py-4">
        <header class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="page-title">
                    <span class="icon-badge"><i class="bi bi-bar-chart-fill"></i></span>
                    Ranking de Jogadores
                </h1>
                <p class="page-subtitle mt-2">Acompanhe quem está no topo. Vitória vale <strong>3 pts</strong>, empate vale <strong>1 pt</strong>.</p>
            </div>
            <div class="d-flex gap-2 flex-wrap" id="headerActions"></div>
        </header>

        <section class="row g-3 mb-4" id="statsRow">
            <div class="col-md-4">
                <div class="card-stat hover-lift">
                    <span class="stat-icon"><i class="bi bi-people-fill"></i></span>
                    <div>
                        <div class="stat-label">Jogadores</div>
                        <div class="stat-value" id="statPlayers">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-stat warm hover-lift">
                    <span class="stat-icon"><i class="bi bi-fire"></i></span>
                    <div>
                        <div class="stat-label">Líder atual</div>
                        <div class="stat-value" id="statLeader">—</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-stat cool hover-lift">
                    <span class="stat-icon"><i class="bi bi-stars"></i></span>
                    <div>
                        <div class="stat-label">Pontuação total</div>
                        <div class="stat-value" id="statTotalScore">0</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="card-app mb-4" id="addPlayerSection" style="display:none;">
            <div class="card-header">
                <i class="bi bi-person-plus-fill"></i> Adicionar jogador
            </div>
            <div class="card-body">
                <form id="addPlayerForm" class="row g-3 align-items-end">
                    <div class="col-md-9">
                        <label class="form-label" for="playerName">Nome do jogador</label>
                        <input type="text" id="playerName" class="form-control" placeholder="Digite o nome do Jogador" required>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-plus-circle"></i> Adicionar
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <section class="card-app">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                <span><i class="bi bi-list-ol"></i> Classificação geral</span>
                <div class="d-flex gap-2 flex-wrap align-items-center">
                    <div class="search-input" style="width: 420px;">
                        <i class="bi bi-search"></i>
                        <input type="search" id="rankingSearch" class="form-control" placeholder="Buscar jogador…">
                    </div>
                    <button class="btn btn-ghost btn-sm" id="exportCsvBtn">
                        <i class="bi bi-download"></i> Exportar CSV
                    </button>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table-app">
                        <thead>
                            <tr>
                                <th style="width: 80px;">#</th>
                                <th class="sortable" data-sort="name">Jogador <span class="sort-indicator"><i class="bi bi-arrow-down-up"></i></span></th>
                                <th class="sortable active" data-sort="score" style="width: 180px;">Pontuação <span class="sort-indicator"><i class="bi bi-sort-down"></i></span></th>
                                <th id="thAcoes" style="width: 140px; text-align: right;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="rankingTable">
                            <tr class="loading-row">
                                <td colspan="4">
                                    <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                                    <span class="ms-2">Carregando ranking…</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/scripts/auth.js"></script>
    <script src="/scripts/common.js"></script>
    <script src="/scripts/theme.js"></script>
    <script>
        (function () {
            const user = typeof authUser === 'function' ? authUser() : null;
            if (user?.role === 'Admin') {
                document.getElementById('headerActions').innerHTML =
                    '<a href="/match.html" class="btn btn-primary"><i class="bi bi-controller"></i> Partidas</a>';
                document.getElementById('addPlayerSection').style.display = '';
            }
        })();
    </script>
    <script src="/scripts/ranking.js"></script>
</body>
</html>
