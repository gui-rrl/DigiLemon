<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss — RankingDigi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app.css">
</head>
<body data-page="tournaments">
    <main class="container py-4">
        <header class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="page-title">
                    <span class="icon-badge"><i class="bi bi-grid-3x3-gap-fill"></i></span>
                    <span id="tournamentTitle">Carregando…</span>
                </h1>
                <p class="page-subtitle mt-1" id="tournamentSubtitle">Swiss + Top Cut</p>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <button id="btnAdvance" class="btn btn-primary" style="display:none">
                    <i class="bi bi-arrow-right-circle"></i> Avançar rodada
                </button>
                <button id="btnTopCut" class="btn btn-warning" style="display:none">
                    <i class="bi bi-trophy-fill"></i> Gerar Top Cut
                </button>
                <button id="btnFinish" class="btn btn-success" style="display:none">
                    <i class="bi bi-check2-circle"></i> Encerrar Torneio
                </button>
                <a href="/tournaments.html" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>
        </header>

        <div class="row g-4 align-items-start">
            <!-- Classificação -->
            <div class="col-lg-6">
                <section class="card-app swiss-standings-card">
                    <div class="card-header">
                        <i class="bi bi-list-ol"></i> Classificação
                    </div>
                    <div class="card-body p-0">
                        <div id="standingsContainer">
                            <div class="p-4 text-center text-muted-2">Carregando…</div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Rodadas Swiss -->
            <div class="col-lg-6">
                <!-- Top Cut (aparece após geração) -->
                <div id="topCutSection" style="display:none" class="mb-3">
                    <section class="card-app">
                        <div class="card-header" style="color:var(--warning)">
                            <i class="bi bi-trophy-fill"></i> Top Cut — Dupla Eliminação
                            <a id="topCutLink" href="#" class="btn btn-sm btn-warning ms-auto">
                                <i class="bi bi-diagram-3"></i> Ver bracket
                            </a>
                        </div>
                        <div class="card-body">
                            <div id="topCutInfo" class="text-muted-2" style="font-size:0.9rem;"></div>
                        </div>
                    </section>
                </div>

                <!-- Rodadas -->
                <div id="roundsContainer">
                    <div class="p-4 text-center text-muted-2">Carregando…</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal resultado -->
    <div class="modal fade" id="resultModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-flag-fill me-2"></i> Registrar resultado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Vencedor</label>
                    <select id="winnerSelect" class="form-select"></select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="saveResultBtn">
                        <i class="bi bi-check2-circle"></i> Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/auth.js"></script>
    <script src="/scripts/common.js"></script>
    <script src="/scripts/swiss.js"></script>
</body>
</html>
