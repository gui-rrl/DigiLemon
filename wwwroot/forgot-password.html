<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
<script>(function(){var t=localStorage.getItem("rankingdigi-theme")||(matchMedia("(prefers-color-scheme: light)").matches?"light":"dark");document.documentElement.setAttribute("data-theme",t);})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar conta — RankingDigi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/app.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--gradient-bg); padding: 2rem 1rem; }
        .card-wrap {
            width: 100%; max-width: 420px;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-lg);
        }
        .logo-icon { font-size: 2.5rem; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .page-title { font-family: 'Sora', sans-serif; font-weight: 700; color: var(--text-1); }
        .page-sub   { color: var(--text-3); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card-wrap">
        <div class="text-center mb-4">
            <div class="logo-icon mb-2"><i class="bi bi-trophy-fill"></i></div>
            <h1 class="page-title h4 mb-1">Recuperar conta</h1>
            <p class="page-sub">Informe o e-mail vinculado à sua conta.<br>Enviaremos um link para redefinir a senha.</p>
        </div>

        <!-- Formulário -->
        <div id="formView">
            <form id="forgotForm" novalidate>
                <div class="mb-4">
                    <label for="email" class="form-label">E-mail da conta</label>
                    <input type="email" id="email" class="form-control" placeholder="seu@email.com" autocomplete="email" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="sendBtn">
                    <i class="bi bi-envelope-arrow-up-fill"></i> Enviar link de recuperação
                </button>
            </form>
        </div>

        <!-- Confirmação de envio -->
        <div id="successView" style="display:none; text-align:center;">
            <div style="font-size:3rem; margin-bottom:1rem;">📬</div>
            <h2 class="page-title h5 mb-2">Verifique seu e-mail</h2>
            <p class="page-sub mb-4">Se o e-mail informado estiver cadastrado, você receberá um link para redefinir a senha em breve.</p>
            <a href="/login.html" class="btn btn-secondary w-100">
                <i class="bi bi-arrow-left"></i> Voltar ao login
            </a>
        </div>

        <hr style="border-color: var(--border); margin: 1.5rem 0;">
        <p class="text-center mb-0" style="font-size:0.87rem; color: var(--text-3);">
            Lembrou a senha?
            <a href="/login.html" style="color: var(--primary); font-weight:600;">Fazer login</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            if (!email || !email.includes('@')) {
                Swal.fire({ icon: 'warning', title: 'Atenção', text: 'Informe um e-mail válido.', confirmButtonText: 'Ok' });
                return;
            }

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Enviando…';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
                    body: JSON.stringify({ email }),
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || 'Erro ao processar solicitação.');
                }

                // Mostra confirmação independente de o e-mail existir (segurança)
                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').style.display = '';
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Erro', text: err.message, confirmButtonText: 'Tentar novamente' });
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-envelope-arrow-up-fill"></i> Enviar link de recuperação';
            }
        });
    </script>
    <script src="/scripts/theme.js"></script>
</body>
</html>
